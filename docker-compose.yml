services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file:
      - apps/server/.env
    ports:
      - '3000:3000'
    volumes:
      - uploads:/app/apps/server/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '8080:80'
    depends_on:
      - server

volumes:
  uploads: {}
